<title>Clínica | Tayana Grego Arquitetura</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f7f7f7;
    color:#283D5C;
}

header{
    background:white;
    padding:30px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

h1{
    margin-bottom:10px;
}

.descricao{
    color:#666;
    margin-bottom:40px;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.galeria img{
    width:100%;
    border-radius:15px;
    object-fit:cover;
    transition:.3s;
    cursor:pointer;
}

.galeria img:hover{
    transform:scale(1.03);
}

.botao{
    display:inline-block;
    margin-top:40px;
    padding:14px 25px;
    background:#283D5C;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>

</head>
