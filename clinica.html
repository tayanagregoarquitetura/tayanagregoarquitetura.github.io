<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clínica CDA | Tayana Grego Arquitetura</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,Helvetica,sans-serif;

background:#fafafa;

color:#283D5C;

}

.hero{

height:90vh;

background:url("CDA1.png") center center;

background-size:cover;

display:flex;

align-items:center;

justify-content:center;

position:relative;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:rgba(0,0,0,.35);

}

.hero div{

position:relative;

text-align:center;

color:white;

}

.hero h1{

font-size:60px;

margin-bottom:15px;

}

.hero p{

font-size:22px;

}

.container{

max-width:1300px;

margin:auto;

padding:70px 30px;

}

.texto{

max-width:900px;

margin:auto;

text-align:center;

line-height:1.8;

font-size:18px;

margin-bottom:60px;

}

.galeria{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(350px,1fr));

gap:20px;

}

.galeria img{

width:100%;

border-radius:18px;

transition:.3s;

cursor:pointer;

}

.galeria img:hover{

transform:scale(1.03);

}

.botao{

display:block;

width:260px;

margin:70px auto;

text-align:center;

padding:18px;

background:#283D5C;

color:white;

text-decoration:none;

border-radius:10px;

font-size:18px;

}

.botao:hover{

background:#1f3049;

}

</style>

</head>

<body>

<section class="hero">

<div>

<h1>Clínica CDA</h1>

<p>Projeto de Interiores Comerciais</p>

</div>

</section>

<div class="container">

<div class="texto">

<h2 style="margin-bottom:25px;">Sobre o projeto</h2>

<p>

Escreve aqui a história desse projeto.

Como nasceu.

Qual foi o desafio.

Qual foi o conceito.

Como o espaço foi pensado.

Quais materiais foram utilizados.

Tudo isso aproxima muito o cliente.

</p>

</div>

<div class="galeria">

<img src="CDA1.png">
<img src="CDA2.png">
<img src="CDA3.png">
<img src="CDA4.png">
<img src="CDA5.png">
<img src="CDA6.png">
<img src="CDA7.png">
<img src="CDA8.png">
<img src="CDA9.JPEG">
<img src="CDA10.JPEG">
<img src="CDA11.JPEG">
<img src="CDA12.JPEG">
<img src="CDA13.JPEG">

</div>

<a class="botao" href="https://wa.me/SEUNUMERO">

Solicitar um orçamento

</a>

</div>

</body>

</html>
