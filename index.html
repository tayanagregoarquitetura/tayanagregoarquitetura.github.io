<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Arial", "Helvetica", sans-serif;
  color: #283D5C;
  background: #f8f8f6;
  line-height: 1.6;
}

header {
  background: rgba(255,255,255,0.95);
  padding: 18px 20px;
  border-bottom: 1px solid #e5e7eb;
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(8px);
}

.topbar {
  max-width: 1150px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.brand img {
  height: 72px;
  width: auto;
}

nav {
  display: flex;
  gap: 24px;
}

nav a {
  text-decoration: none;
  color: #283D5C;
  font-weight: 600;
  font-size: 15px;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #637FAF;
}

.hero {
  max-width: 1150px;
  margin: 0 auto;
  padding: 90px 20px 70px;
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 45px;
  align-items: center;
}

.hero h1 {
  font-size: 52px;
  line-height: 1.08;
  margin: 0 0 22px;
  color: #283D5C;
  letter-spacing: -1px;
}

.hero p {
  font-size: 18px;
  margin: 0 0 30px;
  max-width: 650px;
  color: #555;
}

.hero-card {
  background: white;
  border-radius: 28px;
  padding: 18px;
  box-shadow: 0 20px 50px rgba(40,61,92,0.12);
  border: 1px solid #e5e7eb;
  animation: aparecer 0.9s ease forwards;
}

.hero-card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 22px;
}

.btn-group {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn {
  display: inline-block;
  text-decoration: none;
  padding: 14px 24px;
  border-radius: 14px;
  font-weight: 700;
  transition: all 0.3s ease;
}

.btn-primary {
  background: #283D5C;
  color: white;
}

.btn-secondary {
  background: transparent;
  color: #283D5C;
  border: 1px solid #637FAF;
}

.btn:hover {
  transform: translateY(-3px);
}
section {
  max-width: 1150px;
  margin: 0 auto;
  padding: 75px 20px;
}

.section-title {
  font-size: 36px;
  margin: 0 0 12px;
  color: #283D5C;
  letter-spacing: -0.5px;
}

.section-subtitle {
  font-size: 17px;
  color: #666;
  margin: 0 0 35px;
  max-width: 750px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.card {
  background: #ffffff;
  border-radius: 22px;
  padding: 30px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 15px 35px rgba(40,61,92,0.08);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  animation: aparecer 0.8s ease forwards;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 25px 45px rgba(40,61,92,0.14);
}

.card h3 {
  margin-top: 0;
  margin-bottom: 12px;
  font-size: 22px;
  color: #283D5C;
}

.card p {
  margin: 0;
  color: #555;
  font-size: 15px;
}

.about {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

.about-box {
  background: #fff;
  border-radius: 22px;
  padding: 32px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 15px 35px rgba(40,61,92,0.08);
  transition: transform 0.35s ease;
}

.about-box:hover {
  transform: translateY(-6px);
}

.about-box h3 {
  color: #283D5C;
}

.about-box p {
  color: #555;
}

.portfolio {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.portfolio-item {
  min-height: 280px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(40,61,92,0.12);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.portfolio-item:hover {
  transform: translateY(-10px);
  box-shadow: 0 25px 50px rgba(40,61,92,0.18);
}

.portfolio-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease;
}

.portfolio-item:hover img {
  transform: scale(1.08);
}

.portfolio-item span {
  position: absolute;
  left: 18px;
  bottom: 18px;
  background: rgba(255,255,255,0.95);
  padding: 9px 15px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 700;
  color: #283D5C;
}

.contact-box {
  background: #283D5C;
  color: white;
  border-radius: 30px;
  padding: 40px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 30px;
}

.contact-box h2 {
  margin-top: 0;
  font-size: 36px;
}

.contact-box p,
.contact-box a {
  color: #f5f5f5;
  text-decoration: none;
}

footer {
  padding: 35px 20px 50px;
  text-align: center;
  color: #777;
  font-size: 14px;
}


/* ANIMAÇÕES */

@keyframes aparecer {
  from {
    opacity: 0;
    transform: translateY(25px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}


/* CELULAR */

@media (max-width: 900px) {

  nav {
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hero,
  .about,
  .contact-box,
  .grid-3,
  .portfolio {
    grid-template-columns: 1fr;
  }

  .hero {
    padding-top: 50px;
  }

  .hero h1 {
    font-size: 38px;
  }

  .hero-card img {
    height: 350px;
  }
}

</style>
